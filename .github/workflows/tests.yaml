name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  run_tests_ubuntu:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup package
        uses: ./.github/actions/setup
        with:
          python-version: "3.12"

      - name: Run tests
        run: >
          uv run pytest -v
          --ignore=docs
          --cov=src
          --cov-report=xml:coverage.xml
          --cov-report=term
          --junitxml=junit.xml

      # Skip Codecov on Dependabot PRs: workflow runs from Dependabot do not
      # have access to repository secrets (a deliberate GitHub security
      # policy), so CODECOV_TOKEN is empty and the upload fails. Coverage on
      # dependency bumps is not meaningful anyway.
      - name: Upload coverage to Codecov
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
          verbose: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && github.actor != 'dependabot[bot]' }}
        uses: codecov/test-results-action@v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit.xml
